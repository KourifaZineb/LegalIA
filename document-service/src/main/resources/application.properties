spring.application.name=document-service
server.port=8088
spring.config.import=optional:configserver:http://localhost:9999
spring.cloud.config.enabled=true

# PostgreSQL Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/document_service
spring.datasource.username=your_username
spring.datasource.password=your_password
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Firebase Configuration
firebase.storage.bucket=legal-ai-5c545.firebasestorage.app
firebase.service.account.path=/firebase-service-account.json

# COMPLETELY DISABLE MONGODB
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.mongo.MongoAutoConfiguration,org.springframework.boot.autoconfigure.data.mongo.MongoDataAutoConfiguration,org.springframework.boot.autoconfigure.data.mongo.MongoRepositoriesAutoConfiguration

# Force disable MongoDB repositories
spring.data.mongodb.repositories.enabled=false

# Allow bean overriding as temporary fix
spring.main.allow-bean-definition-overriding=true