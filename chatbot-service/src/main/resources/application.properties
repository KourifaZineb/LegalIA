# Application Configuration
spring.application.name=chatbot-service
server.port=9090

# External API URLs
chroma.api.url=http://localhost:8000
nlp.python.api.url=http://localhost:5000/chat

# Document Service Configuration
document.service.url=http://localhost:8088
document.service.timeout=30000

# Flask API Configuration (for document analysis)
flask.api.url=http://localhost:5000
flask.api.timeout=60000

# Config Server
spring.config.import=optional:configserver:http://localhost:9999

# File Upload Configuration
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=100MB
spring.servlet.multipart.enabled=true

# RestTemplate Configuration
rest.template.connection.timeout=10000
rest.template.read.timeout=60000

# Management Endpoints
management.endpoints.web.exposure.include=health,info,mappings

# Database/JPA Logging
logging.level.org.hibernate=DEBUG
logging.level.org.springframework.orm.jpa=DEBUG
spring.jpa.show-sql=true

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update